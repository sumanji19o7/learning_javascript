<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>stopwatch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 id ="h1"> Stopwatch</h1>
    <div id="container">
        <div id="display">
            00:00:00
        </div>

        <div id="controls">
            <button id = "starting" onclick="starttime()">start</button>
            <button id = "stopping" onclick="stoptime()">stop</button>
            <button id = "resetting" onclick="resettime()">reset </button>
        </div>
    </div>
    

    <script src="script.js"></script>
</body>
</html>
